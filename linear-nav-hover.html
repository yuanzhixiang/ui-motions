<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Linear 导航栏 hover 动效 Linear Nav Hover</title>
    <meta
      name="description"
      content="1:1 复刻 Linear 官网导航栏：hover 时文字变亮、玻璃背景亮起，transition 挂在基态使进入/移开对称渐变，0.1s + easeOutQuad 保证即时感；含毛玻璃 header、设计令牌断点与 Inter Variable 字体。"
    />
    <meta name="source" content="https://linear.app" />
    <style>
      /* 原版的 @font-face：Inter Variable 可变字体（100-900 全字重一个文件） */
      @font-face {
        font-family: "Inter Variable";
        font-weight: 100 900;
        font-display: swap;
        font-style: normal;
        src: url(https://static.linear.app/fonts/InterVariable.woff2?v=4.1)
          format("woff2");
      }
      @font-face {
        font-family: "Inter Variable";
        font-weight: 100 900;
        font-display: swap;
        font-style: italic;
        src: url(https://static.linear.app/fonts/InterVariable-Italic.woff2?v=4.1)
          format("woff2");
      }

      /* ============ 设计令牌（来自原版 index.BGg4XGWg.css 的 :root） ============ */
      :root {
        --header-height: 72px;
        --header-blur: 20px;

        --homepage-outer-padding: 46px;
        --homepage-max-width: calc(1344px + var(--homepage-outer-padding) * 2);
        --homepage-padding-inset: 32px;

        --page-padding-inline: 24px;
        --page-padding-right: max(
          env(safe-area-inset-right),
          var(--page-padding-inline)
        );

        --layer-header: 100;
        --speed-quickTransition: 0.1s;
        --ease-out-quad: cubic-bezier(0.25, 0.46, 0.45, 0.94);
        --radius-rounded: 9999px;

        /* 原版的字重梯度（Inter Variable 可变字重） */
        --font-weight-light: 300;
        --font-weight-normal: 400;
        --font-weight-medium: 510;
        --font-weight-semibold: 590;
        --font-weight-bold: 680;

        /* 暗色主题下的取值 */
        --header-bg: #0b0b0bcc;
        --header-border: #ffffff14;
        --color-bg-primary: #08090a;
        --color-text-primary: #f7f8f8;
        --color-text-tertiary: #8a8f98;
        --color-border-primary: #23252a;
        --color-button-invert-bg: #e5e5e6;
        --shadow-stack-low:
          0px 8px 2px 0px #0000, 0px 5px 2px 0px #00000003,
          0px 3px 2px 0px #0000000a, 0px 1px 1px 0px #00000012,
          0px 0px 1px 0px #00000014;
      }

      /* 原版的变量断点：留白随视口宽度变化 */
      @media (max-width: 1280px) {
        :root {
          --homepage-outer-padding: 10px;
        }
      }
      @media (max-width: 1024px) {
        :root {
          --homepage-outer-padding: 28px;
          --homepage-padding-inset: 8px;
        }
      }
      @media (max-width: 640px) {
        :root {
          --homepage-outer-padding: 16px;
          --header-height: 64px;
        }
      }

      /* 原版 @layer reset 里的全局盒模型重置：
         没有它，width:100% + padding 会按 content-box 溢出容器 */
      *,
      *::before,
      *::after {
        box-sizing: border-box;
      }

      html {
        font-size: 100%;
        font-weight: var(--font-weight-normal);
      }

      body {
        margin: 0;
        background: var(--color-bg-primary);
        color: var(--color-text-primary);
        /* 原版的完整字体栈（--sx-1ipkkxf） */
        font-family:
          "Inter Variable", "SF Pro Display", -apple-system,
          BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen, Ubuntu, Cantarell,
          "Open Sans", "Helvetica Neue", "Linear Thai", sans-serif;
        /* macOS 上让文字变细的关键：抗锯齿渲染（原版 body 同款） */
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        /* Inter 的字形特性开关 + 可变字体光学尺寸（原版 body 同款） */
        --font-settings: "cv01", "ss03";
        font-feature-settings: var(--font-settings);
        --font-variations: "opsz" auto;
        font-variation-settings: var(--font-variations);
      }

      /* 原版 hCgVwa_reset-button：清掉 button 的默认样式 */
      .reset-button {
        appearance: none;
        background: none;
        border: none;
        font: inherit;
        color: inherit;
        cursor: pointer;
        margin: 0;
        padding: 0;
      }

      /* ============ Header（原版 TZTsQG_header） ============ */
      .header {
        position: fixed;
        top: 0;
        inset-inline: 0;
        margin-inline: auto;
        z-index: var(--layer-header);
        user-select: none;
        isolation: isolate;
        /* 弹窗移除滚动条时补偿位移，平时为 0 */
        transform: translateX(
          calc(-1 * var(--removed-body-scroll-bar-size, 0px) / 2)
        );
        backdrop-filter: blur(var(--header-blur));
        background: linear-gradient(
          180deg,
          var(--header-bg) 0%,
          color-mix(in oklab, var(--header-bg) 100%, transparent 5%) 100%
        );
        border-bottom: 1px solid var(--header-border);
        transition: var(--speed-quickTransition) var(--ease-out-quad);
        transition-property: border-color, background;
      }

      .header::before {
        content: "";
        pointer-events: none;
        background: linear-gradient(
          180deg,
          var(--color-bg-primary) 0%,
          transparent 100%
        );
        position: absolute;
        inset: 0;
      }

      /* 原版 TZTsQG_menuRoot */
      .menuRoot {
        display: flex;
        align-items: center;
        height: 100%;
      }
      @media (max-width: 768px) {
        .menuRoot {
          flex-direction: column;
        }
      }

      /* 原版 TZTsQG_innerWrapper */
      .innerWrapper {
        height: var(--header-height);
        width: 100%;
        max-width: var(--homepage-max-width);
        padding-left: calc(
          var(--homepage-padding-inset) + var(--homepage-outer-padding) - 1px
        );
        padding-right: calc(
          var(--homepage-padding-inset) + var(--homepage-outer-padding) - 1px
        );
        align-items: center;
        margin-inline: auto;
        display: flex;
      }
      .innerWrapper > div {
        width: 100%;
      }

      /* 原版 TZTsQG_list */
      .list {
        min-height: var(--header-height);
        align-items: center;
        gap: 8px;
        list-style: none;
        margin: 0;
        padding: 0;
        display: flex;
      }
      @media (max-width: 768px) {
        .list {
          justify-content: flex-start;
          gap: 16px;
        }
      }

      /* 原版 TZTsQG_item */
      .item {
        white-space: nowrap;
        margin: 0;
        list-style: none;
        display: grid;
      }

      /* 原版 TZTsQG_logoItem：flex:1 吃掉剩余空间，把右侧区推到最右 */
      .logoItem {
        color: var(--color-text-primary);
        flex: 1;
        justify-content: flex-start;
        display: flex;
      }

      /* 原版 TZTsQG_logoLink（含 I_mUeq_root 的链接 reset） */
      .logoLink {
        border-radius: 6px;
        justify-content: flex-start;
        align-items: center;
        height: 32px;
        margin-left: -8px;
        padding: 0 8px;
        display: flex;
        color: inherit;
        cursor: pointer;
        text-decoration: none;
      }

      /* 原版 TZTsQG_rightSideWrapper */
      .rightSideWrapper {
        flex-shrink: 0;
        align-items: center;
        width: 100%;
        max-width: 620px;
        margin: 0;
        display: flex;
      }
      @media (max-width: 1024px) {
        .rightSideWrapper {
          width: auto;
        }
      }

      /* 原版 TZTsQG_navItems */
      .navItems {
        align-items: center;
        margin: 0;
        padding: 0;
        list-style: none;
        display: flex;
      }

      /* 原版 TZTsQG_navDivider：菜单和按钮之间的竖线 */
      .navDivider {
        background: var(--color-border-primary);
        width: 1px;
        height: 16px;
        margin-inline: 8px;
      }

      /* 原版 TZTsQG_buttons */
      .buttons {
        justify-content: flex-end;
        align-items: center;
        gap: 8px;
        margin: 0;
        padding: 0;
        list-style: none;
        display: flex;
      }

      /* 原版 TZTsQG_buttonItem */
      .buttonItem {
        justify-content: center;
        align-items: center;
        display: flex;
      }
      .buttonItem a,
      .buttonItem span {
        width: 100%;
      }

      /* 原版 TZTsQG_anchor：导航链接/触发器的公共样式（hover 态未实现） */
      .anchor {
        --anchor-glass-bg: #ffffff14;
        height: 32px;
        color: var(--color-text-tertiary);
        border-radius: var(--radius-rounded);
        transition: var(--speed-quickTransition) var(--ease-out-quad);
        transition-property: color, background;
        background: 0 0;
        justify-content: center;
        align-items: center;
        padding: 0 12px;
        font-size: 13px;
        display: flex;
        position: relative;
        cursor: pointer;
        text-decoration: none;
      }

      /* 原版的 hover：包在 any-hover 里，触屏设备不生效。
         进入/移开都走基态那条 0.1s transition（color, background），
         完全对称；背景色太淡所以移开时的渐隐不易察觉 */
      @media (any-hover: hover) {
        .anchor:hover {
          color: var(--color-text-primary);
          background: var(--anchor-glass-bg);
        }
      }

      /* 原版 S36ykG_root + S36ykG_variant + S36ykG_variant-invert + S36ykG_size-small
         （Sign up 按钮，hover 态未实现，:active 缩放保留） */
      .button {
        appearance: none;
        cursor: pointer;
        white-space: nowrap;
        user-select: none;
        max-width: 100%;
        flex-shrink: 0;
        justify-content: center;
        align-items: center;
        margin: 0;
        display: inline-flex;
        position: relative;
        font-weight: var(--font-weight-medium);
        font-size: 13px;
        line-height: 32px;
        height: 32px;
        gap: 8px;
        padding: 0 12px;
        border-radius: var(--radius-rounded);
        background: var(--color-button-invert-bg);
        border: 1px solid var(--color-button-invert-bg);
        color: var(--color-bg-primary);
        box-shadow: var(--shadow-stack-low);
        text-decoration: none;
        transition: 0.16s var(--ease-out-quad);
        transition-property:
          border, background-color, color, box-shadow, opacity, filter,
          transform;
      }
      .button:active {
        transform: scale(0.97);
      }

      /* 原版 TZTsQG_mobileItem / TZTsQG_mobileMenuTrigger：移动端汉堡菜单 */
      .mobileItem {
        display: none;
      }
      .mobileItem.mobileItem {
        margin-left: calc(-1 * var(--page-padding-right) + 8px);
      }
      @media (max-width: 768px) {
        .mobileItem {
          display: block;
        }
      }
      .mobileMenuTrigger {
        height: var(--header-height);
        aspect-ratio: 1;
        outline: none;
        justify-content: center;
        align-items: center;
        margin-right: -28px;
        display: flex;
      }

      /* 原版响应式工具类（utils.css） */
      @media (max-width: 640px) {
        .hide-mobile {
          display: none !important;
        }
      }
      @media (max-width: 768px) {
        .hide-tablet {
          display: none !important;
        }
      }
      @media (max-width: 1024px) {
        .hide-laptop {
          display: none !important;
        }
      }
    </style>
  </head>
