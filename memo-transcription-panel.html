<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="description" content="复刻 Memo(MemoAI) 1.7.5 的转录字幕面板：单选高亮 bg-primary/30 直角色块、点时间戳 seek、点文本 contenteditable 编辑、hover 淡入 #N 序号。令牌与类名逐值提取自 app.asar 产物，主色 hsl(238 50% 56%)。" />
<meta name="source" content="https://github.com/Makememo/MemoAI" />
<title>Memo · Transcription Panel（复刻）</title>
<style>
/* ===================================================================
   还原自 Memo 1.7.5 (Electron + React + shadcn/ui + Tailwind)
   资源：Memo.app/Contents/Resources/app.asar
        dist/assets/index-f8b22a57.css
        dist/assets/index-68aa31bb.js
   类名沿用原应用：TranscribePanel / ConvertResult / ConvertItem / AimText
   =================================================================== */

/* --- shadcn 主题变量（原样提取，light/dark 靠 media query 切换，不是 .dark 类） --- */
:root{
  color-scheme: light dark;
  --background: 0 0% 100%;
  --foreground: 222.2 84% 4.9%;
  --muted: 210 40% 96.1%;
  --muted-foreground: 215.4 16.3% 46.9%;
  --border: 204 22% 91%;
  --input: 214.3 31.8% 91.4%;
  --primary: 238 50% 56%;             /* #575BC7 */
  --primary-foreground: 210 40% 98%;
  --secondary: 210 40% 96.1%;
  --accent: 210 40% 96.1%;
  --accent-foreground: 238 50% 56%;
  --radius: .5rem;

  /* 旧版品牌变量 */
  --color-brand-color: #575bc7;
  --padding-large: 16px;
  --transition-all: all .16s linear;
}
@media (prefers-color-scheme: dark){
  :root{
    --background: 233 16% 11%;
    --foreground: 210 40% 98%;
    --muted: 235 14% 18%;
    --muted-foreground: 215 20.2% 65.1%;
    --border: 233 13% 25%;
    --input: 233 13% 25%;
    --secondary: 217.2 32.6% 17.5%;
    --accent: 217.2 32.6% 17.5%;
    --accent-foreground: 210 40% 98%;
  }
}

*{box-sizing:border-box}
html,body{margin:0;height:100%;overflow:hidden}
body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Ubuntu,"Helvetica Neue",Helvetica,Arial,
              "PingFang SC","Hiragino Sans GB","Apple SD Gothic Neo","Noto Sans KR",
              "Microsoft YaHei UI","Microsoft YaHei","Source Han Sans CN",sans-serif;
  background:hsl(var(--background));
  color:hsl(var(--foreground));
  user-select:none;
}
body *{user-select:none}

/* ============ 整体：左视频 / 右转录，各占一半 ============ */
.App-content{display:flex;height:100%;width:100%}
.App-content > .media-side{width:50%;min-width:0;display:flex;flex-direction:column;background:hsl(var(--muted))}
.App-content > .text-side{width:50%;min-width:0;border-left:1px solid hsl(var(--border));display:flex;flex-direction:column;min-height:0;background:hsl(var(--background))}

/* ---------------- 左侧：视频占位 ---------------- */
.player{flex:1;display:flex;flex-direction:column;padding:16px;gap:12px;min-height:0}
.player__stage{
  flex:1;min-height:0;border-radius:8px;background:#0f1115;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;
  color:#8a92a6;position:relative;overflow:hidden;
}
.player__stage::after{
  content:"";position:absolute;inset:0;
  background:repeating-linear-gradient(45deg,rgba(255,255,255,.02) 0 10px,transparent 10px 20px);
  pointer-events:none;
}
.player__badge{
  display:inline-flex;align-items:center;gap:8px;
  padding:6px 12px;border-radius:999px;
  border:1px dashed rgba(255,255,255,.25);
  font-size:12px;letter-spacing:.02em;
}
.player__seek{
  font-size:32px;font-weight:600;letter-spacing:.04em;
  color:#fff;font-variant-numeric:tabular-nums;
}
.player__hint{font-size:12px;color:#6b7280}
/* 进度条 */
.player__bar{height:4px;border-radius:2px;background:hsl(var(--border));position:relative;cursor:pointer}
.player__bar > i{position:absolute;left:0;top:0;height:100%;border-radius:2px;background:hsl(var(--primary));width:0;transition:width .2s ease}
.player__bar > b{
  position:absolute;top:50%;width:10px;height:10px;border-radius:50%;
  background:hsl(var(--primary));transform:translate(-50%,-50%);left:0;transition:left .2s ease;
}
.player__meta{display:flex;align-items:center;justify-content:space-between;font-size:12px;color:hsl(var(--muted-foreground))}
.player__meta .file{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:70%}

/* ---------------- 面板外壳（LSr） ---------------- */
.TranscribePanel{width:100%;height:100%;box-sizing:border-box;display:flex;flex-direction:column;min-height:0}
.TranscribePanel > .panel-body{min-height:0;flex:1;overflow:hidden}

.ConvertResult{height:100%;overflow-y:auto;overflow-x:hidden}
.ConvertResult .scroll-area{overflow-x:hidden;overflow-y:auto;height:100%;padding-top:8px}

/* ---------------- 字幕行（sgi / .AimText） ---------------- */
.ConvertItem{display:block}
.AimText{
  display:flex;align-items:flex-start;justify-content:center;gap:8px;
  position:relative;padding-left:var(--padding-large);
}
/* 时间戳列：w-12 pt-3 text-xs */
.AimText .time{
  position:relative;width:48px;text-align:center;flex-shrink:0;
  padding-top:12px;cursor:pointer;
  font-size:12px;line-height:16px;color:hsl(var(--muted-foreground));
  transition:color .16s linear;
}
.AimText .time:hover{color:hsl(var(--primary))}
/* “#17” 序号徽标：默认透明，行 hover 时淡入 300ms */
.AimText .time .idx{
  position:absolute;left:50%;transform:translateX(-50%);top:-4px;
  font-size:12px;line-height:16px;
  opacity:0;transition:opacity .3s;
}
.AimText:hover .time .idx{opacity:1;color:hsl(var(--primary))}

/* 文本列：p-2 flex-1 break-words，white-space:pre-wrap */
.AimText .text{
  flex:1;padding:8px;outline:none;cursor:text;
  overflow-wrap:break-word;white-space:pre-wrap;
  font-size:16px;line-height:1.6;
  /* 原应用文本列 className 无 rounded-*，高亮块是直角 */
  border-radius:0;
  transition:color .16s linear,background-color .16s linear;
}
.AimText .text:hover{color:hsl(var(--muted-foreground))}
/* 唯一的高亮态：bg-primary/30（原应用 .AimText.active 无样式，只是 JS 滚动锚点） */
.AimText.active .text{background:hsl(var(--primary)/.3);color:inherit}
/* 编辑态：原应用把 div 换成 textarea，className 为
   "resize-none block p-2 flex-1 outline-none box-border bg-background text-foreground"
   —— 没有边框、没有 ring、没有背景高亮，只是变回 bg-background */
.AimText .text.editing,
.AimText.active .text.editing{
  background:hsl(var(--background));
  color:hsl(var(--foreground));
  border:0;box-shadow:none;outline:none;
  cursor:text;user-select:text;
}
.AimText .text.editing *{user-select:text}
.AimText .text.deleted{text-decoration:line-through;pointer-events:none;color:hsl(var(--muted-foreground))}
/* 译文行：同结构的兄弟节点，时间戳列留空占位 */
.AimText__translated .time{cursor:default}
.AimText__translated .text{color:hsl(var(--muted-foreground));font-size:14px}
/* 搜索命中高亮 */
.AimText .highlight{
  position:relative;border-radius:2px;padding:0 1px;margin:0 -1px;
  background-color:#f7ce3b4d;border:1px solid rgba(247,206,59,.5);
  transition:all .2s ease;pointer-events:none;
}
.AimText .highlight.active{background-color:#ca461633;border:1px solid rgba(202,70,22,.4)}

/* 滚动条 */
.scroll-area::-webkit-scrollbar{width:8px}
.scroll-area::-webkit-scrollbar-thumb{background:hsl(var(--border));border-radius:4px}
.scroll-area::-webkit-scrollbar-track{background:transparent}
</style>
</head>
<body>
<div class="App-content">

  <!-- ==================== 左半：视频区（占位） ==================== -->
  <div class="media-side">
    <div class="player">
      <div class="player__stage">
        <div class="player__badge">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m22 8-6 4 6 4V8Z"/><rect x="2" y="6" width="14" height="12" rx="2"/></svg>
          视频占位 · Video placeholder
        </div>
        <div class="player__seek" id="seekDisplay">00:00</div>
        <div class="player__hint" id="seekHint">点击右侧时间戳跳转到对应时间</div>
      </div>
      <div class="player__bar" id="bar"><i></i><b></b></div>
      <div class="player__meta">
        <span class="file">AI六月更新_压缩版_10MB内.mp4</span>
        <span><span id="curTime">00:00</span> / 03:40</span>
      </div>
    </div>
  </div>

  <!-- ==================== 右半：转录面板 ==================== -->
  <div class="text-side">

    <!-- 面板主体 -->
    <div class="TranscribePanel">
      <div class="panel-body">
        <div class="ConvertResult">

          <!-- 字幕列表 -->
          <div class="scroll-area" data-scroll-id="convert-result">
            <div id="list"></div>
          </div>

        </div>
      </div>
    </div>

  </div>
</div>

<script>
// 转录数据形状对应 note.convertResult：{ st: 起始秒, text }
const lines = [
  { st: 5,  text: '你你的同事' },
  { st: 6,  text: '看你的操作' },
  { st: 6,  text: '一次就學會的工作流程' },
  { st: 8,  text: '每天帶著的AI 眼鏡' },
  { st: 10, text: '甚至開始替工師完成一整個的任務' },
  { st: 13, text: '接著這影片' },
  { st: 14, text: '我會帶你快速看' },
  { st: 15, text: '6月最重要的AI 更新' },
  { st: 17, text: '以及他們背後共同代表的曲誌' },
  { st: 20, text: '第一個是一頓蛇點舞' },
  { st: 21, text: '預計7月初會正式閃線' },
  { st: 23, text: '而它最細心的三個點是' },
  { st: 25, text: '單短原生' },
  { st: 26, text: '30秒影片可以直出' },
  { st: 28, text: '可以同時導入50個全模胎' },
  { st: 31, text: '參考素材' },
  { st: 32, text: '還有三層跟編輯的可能恭喜更高了' },
  { st: 35, text: '這代表短影音的製作門檻' },
  { st: 37, text: '又被拉低了一個層級' },
  { st: 40, text: '第二個更新來自語音模型' },
];

const DURATION = 220; // 03:40
const fmt = s => `${String(Math.floor(s / 60)).padStart(2, '0')}:${String(Math.floor(s % 60)).padStart(2, '0')}`;

const listEl = document.getElementById('list');
listEl.innerHTML = lines.map((l, i) => `
  <div class="ConvertItem" data-index="${i}">
    <div class="AimText group" data-index="${i}">
      <div class="time"><span class="idx">#${i + 1}</span>${fmt(l.st)}</div>
      <div class="text Selecto_item" data-index="${i}">${l.text}</div>
    </div>
  </div>
`).join('');

// ---- 全局单选：任何时刻只有一行是 .active ----
let activeRow = null;
function setActive(row){
  if (activeRow && activeRow !== row) {
    activeRow.classList.remove('active');
    const t = activeRow.querySelector('.text');
    if (t && t.isContentEditable) exitEdit(t);
  }
  activeRow = row;
  if (row) row.classList.add('active');
}

// ---- 编辑：点右侧文字进入编辑（原应用把 div 换成 textarea） ----
function enterEdit(textEl){
  if (textEl.isContentEditable) return;
  textEl.contentEditable = 'plaintext-only';
  textEl.classList.add('editing');
  textEl.focus();
  const r = document.createRange(); r.selectNodeContents(textEl);
  const sel = getSelection(); sel.removeAllRanges(); sel.addRange(r);
  sel.collapseToEnd();
}
function exitEdit(textEl){
  textEl.contentEditable = 'false';
  textEl.classList.remove('editing');
  lines[+textEl.dataset.index].text = textEl.textContent;
}

// ---- 跳转：点左侧时间戳，驱动视频占位 ----
const seekDisplay = document.getElementById('seekDisplay');
const seekHint    = document.getElementById('seekHint');
const curTime     = document.getElementById('curTime');
const barFill     = document.querySelector('#bar > i');
const barDot      = document.querySelector('#bar > b');

function seekTo(sec, index){
  const pct = Math.min(100, sec / DURATION * 100);
  seekDisplay.textContent = fmt(sec);
  curTime.textContent = fmt(sec);
  barFill.style.width = pct + '%';
  barDot.style.left = pct + '%';
  seekHint.textContent = `已跳转到第 ${index + 1} 句 · seekTo(${sec}s)`;
}

listEl.addEventListener('mousedown', e => {
  const row = e.target.closest('.AimText');
  if (!row) return;
  const index = +row.dataset.index;

  // 左侧时间戳 → 只跳转 + 选中该行，不进编辑
  if (e.target.closest('.time')) {
    setActive(row);
    seekTo(lines[index].st, index);
    return;
  }
  // 右侧文字 → 选中该行并进入编辑
  const textEl = e.target.closest('.text');
  if (textEl) {
    setActive(row);
    enterEdit(textEl);
  }
});

// 点空白处收起编辑；Esc / Enter 结束编辑
document.addEventListener('mousedown', e => {
  if (!e.target.closest('.AimText') && activeRow) {
    const t = activeRow.querySelector('.text');
    if (t && t.isContentEditable) exitEdit(t);
  }
});
listEl.addEventListener('keydown', e => {
  if (e.key === 'Escape' || (e.key === 'Enter' && !e.shiftKey)) {
    e.preventDefault();
    const t = e.target.closest('.text');
    if (t) { exitEdit(t); t.blur(); }
  }
});
</script>
